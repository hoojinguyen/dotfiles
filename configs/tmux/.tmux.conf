# .tmux.conf - Terminal multiplexer config

# Enable mouse support (clicking, resizing, scrolling)
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Use Vim shortcuts in copy mode
setw -g mode-keys vi

# Split panes using | and - (and open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Vim direction keys without prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar styling
set -g status-bg black
set -g status-fg white
set -g status-left-length 30
set -g status-left '#[fg=green]#(whoami)#[fg=white]@#[fg=blue]#h #[fg=yellow]| '
set -g status-right '#[fg=cyan]%Y-%m-%d #[fg=white]%H:%M '

# Highlight active window
setw -g window-status-current-style fg=black,bg=green,bold

# Shorten command delay
set -sg escape-time 1
